name: 'npm publish setup'
description: >
  Shared scaffold for publishing a workspace package to npm via OIDC trusted
  publishing: sets up node (with the npm registry configured for auth), upgrades
  the npm CLI to a version that supports trusted publishing, sets up bun, then
  installs deps and builds in the package directory. The caller is expected to
  have already checked out the release tag, and adds the package-specific
  `npm publish` steps afterward.
inputs:
  working-directory:
    description: 'Package directory to install + build in (e.g. ./ts/sdk)'
    required: true
  node-version:
    description: 'Node version for setup-node + npm registry auth'
    required: false
    default: '24.x.x'
runs:
  using: 'composite'
  steps:
    - name: Setup node
      uses: actions/setup-node@7c12f8017d5436eb855f1ed4399f037a36fbd9e8 # v2
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
    - name: Ensure npm CLI supports trusted publishing
      # npm trusted publishing requires npm >= 11.5.1
      shell: bash
      run: npm install -g npm@11.14.1
    - name: Setup bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: 1.3.14
    - name: Install + build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        bun install --frozen-lockfile
        bun run build
