name: main

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash
    working-directory: .

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.91.1
  SOLANA_VERSION: 2.3.11
  ANCHOR_VERSION: 1.0.0
  NODE_VERSION: "24.x.x"
  # Pinned commit of protocol-v2-shadow checked out as a sibling so the
  # `velocity` path dep (programs/velocity_vaults/Cargo.toml) resolves.
  # Must match the commit the fixtures (tests/fixtures/velocity.so) and the
  # published @velocity-exchange/sdk were built from.
  SHADOW_REF: a5fc3d925b9fe8e5eb7aa6a45ca945afe544e311

jobs:
  fmt-clippy:
    name: fmt & clippy
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Link protocol-v2-shadow as sibling
        run: ln -sfn "$GITHUB_WORKSPACE/protocol-v2-shadow" "$GITHUB_WORKSPACE/../protocol-v2-shadow"
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Cache build files
        uses: Swatinem/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Cargo clippy
        run: cargo clippy -p velocity-vaults
  unit-tests:
    name: Unit tests
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Link protocol-v2-shadow as sibling
        run: ln -sfn "$GITHUB_WORKSPACE/protocol-v2-shadow" "$GITHUB_WORKSPACE/../protocol-v2-shadow"
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
      - name: Cache build artefacts
        uses: Swatinem/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1
      - name: Run package checks
        run: cargo check
      - name: Run unit tests
        run: cargo test --lib
  prettier:
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run prettier
        run: bun run prettify
  lint:
    runs-on: ubicloud
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint
  anchor-tests:
    name: Anchor tests
    runs-on: ubicloud
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Link protocol-v2-shadow as sibling
        run: ln -sfn "$GITHUB_WORKSPACE/protocol-v2-shadow" "$GITHUB_WORKSPACE/../protocol-v2-shadow"

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
      - name: Cache build artefacts
        uses: Swatinem/rust-cache@81d053bdb0871dcd3f10763c8cc60d0adc41762b # v1
        with:
          cache-on-failure: "true"

      - uses: ./.github/actions/setup-solana/

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.avm
          key: ${{ runner.os }}-anchor-cli-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        run: |
          sudo apt update -y && sudo apt install libudev-dev
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Setup node
        uses: actions/setup-node@7c12f8017d5436eb855f1ed4399f037a36fbd9e8 # v2
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build sdk
        run: cd ts/sdk && bun install --frozen-lockfile && bun run build && cd ../..

      - name: Build program
        run: anchor build --ignore-keys -- --features anchor-test

      - name: Run anchor tests
        env:
          RUST_LOG: solana_runtime::message_processor::stable_log=info
        run: bash test-scripts/run-anchor-tests.sh --skip-build
  verified-build:
    name: Build Verifiable Artifact
    # Gated off until the velocity crate is published — solana-verify vendors
    # crates and cannot follow a path dep outside the workspace.
    if: ${{ false }}
    runs-on: ubicloud
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Solana Verify CLI
        run: |
          sudo apt update -y && sudo apt install libudev-dev
          cargo install solana-verify --version 0.4.11

      - name: Verifiable Build
        run: |
          solana-verify build --library-name velocity_vaults -b solanafoundation/solana-verifiable-build:3.1.14

      - name: Upload Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build
          path: target/deploy/velocity_vaults.so
