name: main

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash
    working-directory: ./drift-vaults

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.91.1
  SOLANA_VERSION: 2.3.11
  ANCHOR_VERSION: 1.0.0
  NODE_VERSION: '24.x.x'
  # During the Anchor 1.0 migration the `drift` crate and `@drift-labs/sdk`
  # are consumed as a path/link dep on protocol-v2-shadow checked out as a
  # sibling. SHADOW_REF pins which shadow commit CI builds against.
  SHADOW_REF: master

jobs:
  fmt-clippy:
    name: fmt & clippy
    runs-on: ubicloud
    steps:
      - name: Checkout drift-vaults
        uses: actions/checkout@v4
        with:
          path: drift-vaults
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Cache build files
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-vaults
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Cargo clippy
        run: cargo clippy -p drift-vaults
  unit:
    name: Unit tests
    runs-on: ubicloud
    steps:
      - name: Checkout drift-vaults
        uses: actions/checkout@v4
        with:
          path: drift-vaults
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
      - name: Cache build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-vaults
      - name: Run package checks
        run: cargo check
      - name: Run unit tests
        run: cargo test --lib
  yarn-prettier:
    runs-on: ubicloud
    steps:
      - name: Checkout drift-vaults
        uses: actions/checkout@v4
        with:
          path: drift-vaults
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install yarn
        run: yarn install --ignore-scripts
      - name: Run prettier
        run: yarn prettify
  yarn-lint:
    runs-on: ubicloud
    steps:
      - name: Checkout drift-vaults
        uses: actions/checkout@v4
        with:
          path: drift-vaults
      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install yarn
        run: yarn install --ignore-scripts
      - name: Run lint
        run: yarn lint
  anchor-tests:
    runs-on: ubicloud
    timeout-minutes: 60
    steps:
      - name: Checkout drift-vaults
        uses: actions/checkout@v4
        with:
          path: drift-vaults

      - name: Checkout protocol-v2-shadow
        uses: actions/checkout@v4
        with:
          repository: drift-labs/protocol-v2-shadow
          ref: ${{ env.SHADOW_REF }}
          token: ${{ secrets.GH_PAT }}
          path: protocol-v2-shadow

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          profile: minimal
          override: true
      - name: Cache build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drift-vaults
          cache-on-failure: 'true'

      - uses: ./drift-vaults/.github/actions/setup-solana/

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: ~/.avm
          key: ${{ runner.os }}-anchor-cli-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          sudo apt update -y && sudo apt install -y libudev-dev
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup yarn
        run: npm install -g yarn

      - name: Build shadow drift SDK
        run: yarn install && yarn build
        working-directory: ./protocol-v2-shadow/sdk

      - name: Install drift-vaults deps
        run: yarn install

      - name: Build drift-vaults SDK
        run: yarn install && yarn build
        working-directory: ./drift-vaults/ts/sdk

      - name: Anchor build
        run: anchor build --ignore-keys -- --features anchor-test

      - name: Run anchor tests
        env:
          RUST_LOG: solana_runtime::message_processor::stable_log=info
        run: ./test.sh --no-build
  # Verified build is disabled until the `drift` crate is consumed from a
  # published source rather than a local path dep on protocol-v2-shadow.
  # solana-verify build vendors crates, which doesn't work with a path dep
  # outside the cargo workspace.
  verified-build:
    name: Build Verifiable Artifact
    if: ${{ false }}
    runs-on: ubicloud
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Solana Verify
        run: |
          sudo apt update -y && sudo apt install -y libudev-dev
          cargo install --locked --version 0.4.11 solana-verify

      - name: Verifiable Build
        run: solana-verify build --library-name drift_vaults -b solanafoundation/solana-verifiable-build:v${{ env.SOLANA_VERSION }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: target/deploy/drift_vaults.so
